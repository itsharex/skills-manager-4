name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            suffix: darwin-arm64
          - arch: amd64
            suffix: darwin-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build macOS
        run: wails build -platform darwin/${{ matrix.arch }} -ldflags "-s -w"
        env:
          CGO_CFLAGS: "-Wno-deprecated-declarations"
          CGO_LDFLAGS: "-framework UniformTypeIdentifiers"

      - name: Find and enhance macOS .app Bundle
        run: |
          APP_NAME="skillsmanager"
          VERSION="${GITHUB_REF_NAME#v}"

          # wails build creates the .app bundle in build/bin/
          APP_BUNDLE=$(find build/bin -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "ERROR: No .app bundle found in build/bin/"
            ls -la build/bin/
            exit 1
          fi
          echo "Found .app bundle: $APP_BUNDLE"

          # Find the executable inside the bundle
          EXECUTABLE=$(find "$APP_BUNDLE/Contents/MacOS" -type f -executable 2>/dev/null | head -1)
          echo "Executable: $EXECUTABLE"

          # Overwrite Info.plist with correct version
          cat > "$APP_BUNDLE/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIdentifier</key>
              <string>com.skillsmanager.app</string>
              <key>CFBundleName</key>
              <string>Skills Manager</string>
              <key>CFBundleDisplayName</key>
              <string>Skills Manager</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>iconfile</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSRequiresAquaSystemAppearance</key>
              <false/>
          </dict>
          </plist>
          PLIST

          # Generate .icns from asklogo.png if present
          if [ -f "asklogo.png" ]; then
            ICONSET_DIR=$(mktemp -d)
            sips -z 16 16     asklogo.png --out "$ICONSET_DIR/icon_16x16.png"     >/dev/null 2>&1
            sips -z 32 32     asklogo.png --out "$ICONSET_DIR/icon_16x16@2x.png"  >/dev/null 2>&1
            sips -z 32 32     asklogo.png --out "$ICONSET_DIR/icon_32x32.png"     >/dev/null 2>&1
            sips -z 64 64     asklogo.png --out "$ICONSET_DIR/icon_32x32@2x.png"  >/dev/null 2>&1
            sips -z 128 128   asklogo.png --out "$ICONSET_DIR/icon_128x128.png"   >/dev/null 2>&1
            sips -z 256 256   asklogo.png --out "$ICONSET_DIR/icon_128x128@2x.png" >/dev/null 2>&1
            sips -z 256 256   asklogo.png --out "$ICONSET_DIR/icon_256x256.png"   >/dev/null 2>&1
            sips -z 512 512   asklogo.png --out "$ICONSET_DIR/icon_256x256@2x.png" >/dev/null 2>&1
            sips -z 512 512   asklogo.png --out "$ICONSET_DIR/icon_512x512.png"   >/dev/null 2>&1
            sips -z 1024 1024 asklogo.png --out "$ICONSET_DIR/icon_512x512@2x.png" >/dev/null 2>&1
            iconutil -c icns "$ICONSET_DIR" -o "$APP_BUNDLE/Contents/Resources/iconfile.icns"
            rm -rf "$ICONSET_DIR"
            echo "Icon generated"
          fi

          # Ad-hoc sign the bundle
          codesign --force --sign - "$APP_BUNDLE" || true
          echo "Code signing done"

      - name: Package macOS .app
        run: |
          APP_BUNDLE=$(find build/bin -name "*.app" -type d 2>/dev/null | head -1)
          cd build/bin
          zip -r "../../Skills-Manager-${{ matrix.suffix }}.zip" "$(basename "$APP_BUNDLE")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Skills-Manager-${{ matrix.suffix }}
          path: Skills-Manager-${{ matrix.suffix }}.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          # Ubuntu 24.04 uses 4.1, Ubuntu 22.04 uses 4.0
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev || \
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -platform linux/amd64 -ldflags "-s -w"

      - name: Package Linux binary
        run: |
          cd build/bin
          tar czf "../../Skills-Manager-linux-amd64.tar.gz" skillsmanager

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Skills-Manager-linux-amd64
          path: Skills-Manager-linux-amd64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -platform windows/amd64 -ldflags "-s -w -H windowsgui"

      - name: Package Windows binary
        run: |
          Compress-Archive -Path "build/bin/skillsmanager.exe" -DestinationPath "Skills-Manager-windows-amd64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Skills-Manager-windows-amd64
          path: Skills-Manager-windows-amd64.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Skills Manager ${{ github.ref_name }}
          body: |
            ## Skills Manager ${{ github.ref_name }}

            ### Downloads
            - **macOS (Apple Silicon)**: `Skills-Manager-darwin-arm64.zip`
            - **macOS (Intel)**: `Skills-Manager-darwin-amd64.zip`
            - **Linux (x64)**: `Skills-Manager-linux-amd64.tar.gz`
            - **Windows (x64)**: `Skills-Manager-windows-amd64.zip`
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
